<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marginalia — A Blog Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #FBF9F4;
  --paper-dim: #F2EFE6;
  --ink: #1A1A1A;
  --ink-soft: #3A3A3A;
  --denim: #2952A3;
  --denim-dark: #1E3D7A;
  --rust: #C44536;
  --mute: #6B6B6B;
  --rule: #DEDACE;
  --font-display: 'Fraunces', serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0; background: var(--paper); color: var(--ink);
  font-family: var(--font-body); font-size: 16px; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--denim); text-decoration: none; cursor: pointer; }
a:hover { text-decoration: underline; }
:focus-visible { outline: 2px solid var(--denim); outline-offset: 2px; }
#app { min-height: 100vh; display: flex; flex-direction: column; }

.masthead { background: var(--paper); position: sticky; top: 0; z-index: 10; }
.masthead-inner { max-width: 760px; margin: 0 auto; padding: 28px 24px 18px; display: flex; align-items: baseline; justify-content: space-between; }
.wordmark { font-family: var(--font-display); font-weight: 600; font-size: 26px; font-style: italic; color: var(--ink); letter-spacing: -0.01em; background: none; border: none; cursor: pointer; padding: 0; }
.wordmark:hover { text-decoration: none; color: var(--denim); }
.masthead-rule { height: 2px; background: var(--ink); max-width: 760px; margin: 0 auto; }
.auth-nav { display: flex; gap: 16px; align-items: baseline; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.03em; text-transform: uppercase; }
.auth-nav span.greeting { color: var(--mute); }
.auth-nav button, .auth-nav a { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.03em; text-transform: uppercase; background: none; border: none; color: var(--denim); cursor: pointer; padding: 0; }

.main { flex: 1; max-width: 760px; width: 100%; margin: 0 auto; padding: 40px 24px 80px; }

.feed-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 36px; gap: 16px; flex-wrap: wrap; }
.feed-title { font-family: var(--font-display); font-weight: 500; font-size: 38px; margin: 0; letter-spacing: -0.01em; }
.feed-list { display: flex; flex-direction: column; }
.post-row { display: flex; gap: 18px; padding: 26px 0; border-bottom: 1px solid var(--rule); }
.post-row:first-child { border-top: 1px solid var(--rule); }
.post-row-num { font-family: var(--font-mono); font-size: 13px; color: var(--mute); width: 28px; flex-shrink: 0; padding-top: 4px; }
.post-row-title { display: block; font-family: var(--font-display); font-weight: 500; font-size: 23px; color: var(--ink); margin-bottom: 6px; letter-spacing: -0.005em; background: none; border: none; text-align: left; cursor: pointer; padding: 0; }
.post-row-title:hover { color: var(--denim); text-decoration: none; }
.post-row-excerpt { margin: 0 0 10px; color: var(--ink-soft); font-size: 15px; line-height: 1.55; }
.post-row-meta { font-family: var(--font-mono); font-size: 12px; color: var(--mute); display: flex; align-items: center; gap: 7px; flex-wrap: wrap; letter-spacing: 0.01em; }
.byline { color: var(--denim-dark); font-weight: 500; }
.dot { color: var(--rule); }

.btn { font-family: var(--font-body); font-weight: 600; font-size: 14px; border-radius: 3px; padding: 10px 18px; cursor: pointer; border: 1px solid transparent; transition: background 0.15s ease, color 0.15s ease; }
.btn-primary { background: var(--ink); color: var(--paper); }
.btn-primary:hover { background: var(--denim); }
.btn-block { width: 100%; }
.btn-text { background: none; border: none; font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--denim); cursor: pointer; padding: 0; }
.btn-text:hover { text-decoration: underline; }
.btn-danger { color: var(--rust); }

.back-link { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; display: inline-block; margin-bottom: 28px; background: none; border: none; color: var(--denim); cursor: pointer; padding: 0; }
.post-detail-title { font-family: var(--font-display); font-weight: 600; font-size: 40px; line-height: 1.15; margin: 0 0 14px; letter-spacing: -0.01em; }
.post-detail-meta { font-family: var(--font-mono); font-size: 13px; color: var(--mute); display: flex; gap: 7px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
.post-owner-actions { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; }
.post-detail-content { font-size: 18px; line-height: 1.75; color: var(--ink-soft); white-space: pre-wrap; padding-top: 18px; border-top: 1px solid var(--rule); margin-bottom: 50px; }

.comments-heading { font-family: var(--font-display); font-style: italic; font-weight: 500; font-size: 22px; margin: 0 0 8px; color: var(--ink-soft); }
.comments-list { margin-bottom: 28px; }
.comment { display: flex; gap: 14px; padding: 18px 0; }
.comment-rule { width: 2px; background: var(--rule); flex-shrink: 0; margin-top: 4px; }
.comment-body { flex: 1; min-width: 0; }
.comment-text { margin: 0 0 8px; font-size: 15px; color: var(--ink-soft); line-height: 1.55; }
.comment-meta { font-family: var(--font-mono); font-size: 11px; color: var(--mute); display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.comment-form { border-top: 1px solid var(--rule); padding-top: 22px; }
.comment-form-prompt { font-family: var(--font-mono); font-size: 12px; color: var(--mute); text-transform: uppercase; letter-spacing: 0.03em; margin: 0 0 10px; }
.comment-form-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
.login-prompt { font-size: 14px; color: var(--mute); border-top: 1px solid var(--rule); padding-top: 22px; }

.auth-wrap, .post-form-wrap { max-width: 440px; margin: 20px auto 0; }
.post-form-wrap { max-width: 100%; }
.auth-title { font-family: var(--font-display); font-weight: 500; font-style: italic; font-size: 32px; margin: 0 0 28px; }
.field { margin-bottom: 18px; display: flex; flex-direction: column; }
.field label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--mute); margin-bottom: 7px; }
.field input, .field textarea, .comment-form textarea {
  font-family: var(--font-body); font-size: 15px; padding: 11px 13px; border: 1px solid var(--rule);
  border-radius: 3px; background: var(--paper); color: var(--ink); resize: vertical; width: 100%;
}
.field input:focus, .field textarea:focus, .comment-form textarea:focus { border-color: var(--denim); }
#postTitle { font-family: var(--font-display); font-size: 19px; }
#postContent { font-size: 16px; line-height: 1.6; }
.form-error { background: #FBEAE7; color: var(--rust); font-size: 13px; padding: 10px 12px; border-radius: 3px; margin: 0 0 16px; }
.form-success { background: #E8F0E3; color: #3C6B2E; font-size: 13px; padding: 10px 12px; border-radius: 3px; margin: 0 0 16px; }
.auth-switch { font-size: 14px; color: var(--mute); margin-top: 18px; text-align: center; }
.post-form-actions { display: flex; gap: 18px; align-items: center; margin-top: 6px; }

.empty-state { padding: 60px 0; text-align: center; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
.empty-title { font-family: var(--font-display); font-style: italic; font-size: 22px; margin: 0 0 6px; color: var(--ink-soft); }
.empty-sub { font-size: 14px; color: var(--mute); margin: 0; }

.demo-banner {
  background: var(--ink); color: var(--paper); font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.03em; text-align: center; padding: 8px 16px;
}
.demo-banner strong { color: #E8D9A0; }

.site-footer { text-align: center; font-family: var(--font-mono); font-size: 11px; color: var(--mute); letter-spacing: 0.02em; padding: 24px; border-top: 1px solid var(--rule); }

@media (max-width: 540px) {
  .feed-title { font-size: 30px; }
  .post-detail-title { font-size: 30px; }
  .post-row { gap: 12px; }
  .masthead-inner { padding: 20px 18px 14px; }
  .main { padding: 28px 18px 60px; }
}
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div id="app">
  <div class="demo-banner">Live demo — data is stored <strong>in your browser only</strong> and resets on refresh.</div>
  <header class="masthead">
    <div class="masthead-inner">
      <button class="wordmark" id="homeLink">Marginalia</button>
      <nav class="auth-nav" id="authNav"></nav>
    </div>
    <div class="masthead-rule"></div>
  </header>
  <main id="main" class="main"></main>
  <footer class="site-footer">Marginalia — built for people who write in the margins.</footer>
</div>

<script>
// ============================================
// In-memory "backend" — simulates the real API
// ============================================
const DB = {
  users: [],     // { id, username, email, password }
  posts: [],     // { id, title, content, authorId, createdAt }
  comments: [],  // { id, text, postId, authorId, createdAt }
  nextId: 1,
};

function genId() { return String(DB.nextId++); }

function findUserById(id) { return DB.users.find(u => u.id === id); }

function publicUser(u) { return u ? { id: u.id, username: u.username, email: u.email } : null; }

// Seed with a couple of example posts so the feed isn't empty on load
(function seed() {
  const demoUser = { id: genId(), username: 'editor', email: 'editor@example.com', password: 'demo123' };
  DB.users.push(demoUser);
  const p1 = { id: genId(), title: 'Why we write in margins', content: 'There is a particular kind of thinking that only happens in the margins of someone else\'s page. Not the polished thought, but the one still forming — the question, the objection, the half-agreement.\n\nThis platform is built around that idea: posts are the main text, and comments are the marginalia. Read, then write back.', authorId: demoUser.id, createdAt: new Date(Date.now() - 86400000 * 2).toISOString() };
  const p2 = { id: genId(), title: 'A short note on RESTful APIs', content: 'Every action here — registering, publishing, commenting — goes through a small set of predictable routes: GET to read, POST to create, PUT to edit, DELETE to remove.\n\nIn the full version of this project, these calls hit a real Express server backed by MongoDB. In this demo, they hit a tiny in-memory store instead, so you can try everything without setting anything up.', authorId: demoUser.id, createdAt: new Date(Date.now() - 86400000).toISOString() };
  DB.posts.push(p1, p2);
  DB.comments.push({ id: genId(), text: 'This is exactly why I prefer reading with a pencil in hand.', postId: p1.id, authorId: demoUser.id, createdAt: new Date(Date.now() - 3600000).toISOString() });
})();

// ============================================
// Simulated API — mirrors the real backend's routes/responses
// ============================================
const Api = {
  register(username, email, password) {
    if (!username || username.length < 3) throw new Error('Username must be 3-30 characters');
    if (!/^\S+@\S+\.\S+$/.test(email)) throw new Error('Valid email is required');
    if (!password || password.length < 6) throw new Error('Password must be at least 6 characters');
    if (DB.users.some(u => u.email === email || u.username === username)) {
      throw new Error('Username or email already in use');
    }
    const user = { id: genId(), username, email, password };
    DB.users.push(user);
    return { token: user.id, user: publicUser(user) };
  },
  login(email, password) {
    const user = DB.users.find(u => u.email === email);
    if (!user || user.password !== password) throw new Error('Invalid email or password');
    return { token: user.id, user: publicUser(user) };
  },
  me(token) {
    const user = findUserById(token);
    if (!user) throw new Error('Not authorized. Please log in.');
    return { user: publicUser(user) };
  },
  getPosts() {
    const posts = DB.posts
      .slice()
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
      .map(p => ({
        ...p,
        _id: p.id,
        author: publicUser(findUserById(p.authorId)),
        commentCount: DB.comments.filter(c => c.postId === p.id).length,
      }));
    return { posts };
  },
  getPost(id) {
    const post = DB.posts.find(p => p.id === id);
    if (!post) throw new Error('Post not found');
    const comments = DB.comments
      .filter(c => c.postId === id)
      .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt))
      .map(c => ({ ...c, _id: c.id, author: publicUser(findUserById(c.authorId)) }));
    return { post: { ...post, _id: post.id, author: publicUser(findUserById(post.authorId)) }, comments };
  },
  createPost(token, title, content) {
    const user = findUserById(token);
    if (!user) throw new Error('Not authorized. Please log in.');
    if (!title || !title.trim()) throw new Error('Title is required');
    if (!content || !content.trim()) throw new Error('Content is required');
    const post = { id: genId(), title: title.trim(), content: content.trim(), authorId: user.id, createdAt: new Date().toISOString() };
    DB.posts.push(post);
    return { post: { ...post, _id: post.id, author: publicUser(user) } };
  },
  updatePost(token, id, title, content) {
    const user = findUserById(token);
    if (!user) throw new Error('Not authorized. Please log in.');
    const post = DB.posts.find(p => p.id === id);
    if (!post) throw new Error('Post not found');
    if (post.authorId !== user.id) throw new Error('Not authorized to edit this post');
    if (title !== undefined && title.trim()) post.title = title.trim();
    if (content !== undefined && content.trim()) post.content = content.trim();
    return { post: { ...post, _id: post.id, author: publicUser(user) } };
  },
  deletePost(token, id) {
    const user = findUserById(token);
    if (!user) throw new Error('Not authorized. Please log in.');
    const idx = DB.posts.findIndex(p => p.id === id);
    if (idx === -1) throw new Error('Post not found');
    if (DB.posts[idx].authorId !== user.id) throw new Error('Not authorized to delete this post');
    DB.posts.splice(idx, 1);
    DB.comments = DB.comments.filter(c => c.postId !== id);
    return { message: 'Post and its comments deleted' };
  },
  addComment(token, postId, text) {
    const user = findUserById(token);
    if (!user) throw new Error('Not authorized. Please log in.');
    if (!text || !text.trim()) throw new Error('Comment text is required');
    const post = DB.posts.find(p => p.id === postId);
    if (!post) throw new Error('Post not found');
    const comment = { id: genId(), text: text.trim(), postId, authorId: user.id, createdAt: new Date().toISOString() };
    DB.comments.push(comment);
    return { comment: { ...comment, _id: comment.id, author: publicUser(user) } };
  },
  deleteComment(token, postId, commentId) {
    const user = findUserById(token);
    if (!user) throw new Error('Not authorized. Please log in.');
    const idx = DB.comments.findIndex(c => c.id === commentId);
    if (idx === -1) throw new Error('Comment not found');
    if (DB.comments[idx].authorId !== user.id) throw new Error('Not authorized to delete this comment');
    DB.comments.splice(idx, 1);
    return { message: 'Comment deleted' };
  },
};

// ============================================
// Frontend app — router + views (no page reloads)
// ============================================
const mainEl = document.getElementById('main');
const authNavEl = document.getElementById('authNav');
let currentUser = null;
let token = null;
let route = { name: 'feed' };

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) + ' · ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}
function excerpt(text, maxLen = 160) {
  const clean = text.trim();
  return clean.length <= maxLen ? clean : clean.slice(0, maxLen).trim() + '…';
}

document.getElementById('homeLink').addEventListener('click', () => { route = { name: 'feed' }; render(); });

function renderAuthNav() {
  if (currentUser) {
    authNavEl.innerHTML = `<span class="greeting">Hi, ${escapeHtml(currentUser.username)}</span><button id="logoutBtn">Log out</button>`;
    document.getElementById('logoutBtn').addEventListener('click', () => {
      currentUser = null; token = null; route = { name: 'feed' }; render();
    });
  } else {
    authNavEl.innerHTML = `<a id="loginLink">Log in</a><a id="registerLink">Sign up</a>`;
    document.getElementById('loginLink').addEventListener('click', () => { route = { name: 'login' }; render(); });
    document.getElementById('registerLink').addEventListener('click', () => { route = { name: 'register' }; render(); });
  }
}

function viewFeed() {
  let data;
  try { data = Api.getPosts(); } catch (e) { mainEl.innerHTML = `<p class="form-error">${escapeHtml(e.message)}</p>`; return; }

  const rows = data.posts.map((post, i) => `
    <article class="post-row">
      <div class="post-row-num">${String(i + 1).padStart(2, '0')}</div>
      <div class="post-row-body">
        <button class="post-row-title" data-post-id="${post._id}">${escapeHtml(post.title)}</button>
        <p class="post-row-excerpt">${escapeHtml(excerpt(post.content))}</p>
        <div class="post-row-meta">
          <span class="byline">${escapeHtml(post.author?.username || 'unknown')}</span>
          <span class="dot">·</span>
          <time class="dateline">${formatDate(post.createdAt)}</time>
          <span class="dot">·</span>
          <span class="comment-count">${post.commentCount === 1 ? '1 comment' : post.commentCount + ' comments'}</span>
        </div>
      </div>
    </article>
  `).join('');

  mainEl.innerHTML = `
    <section class="feed-head">
      <h1 class="feed-title">Dispatches</h1>
      <button class="btn btn-primary" id="newPostBtn">Write a post</button>
    </section>
    <div class="feed-list">
      ${data.posts.length ? rows : `<div class="empty-state"><p class="empty-title">Nothing published yet.</p><p class="empty-sub">Be the first to write a dispatch.</p></div>`}
    </div>
  `;

  document.getElementById('newPostBtn').addEventListener('click', () => {
    route = currentUser ? { name: 'new' } : { name: 'login' };
    render();
  });
  mainEl.querySelectorAll('.post-row-title').forEach(btn => {
    btn.addEventListener('click', () => { route = { name: 'post', id: btn.dataset.postId }; render(); });
  });
}

function viewPostDetail(postId) {
  let data;
  try { data = Api.getPost(postId); }
  catch (e) {
    mainEl.innerHTML = `<button class="back-link" id="backBtn">← Back to dispatches</button><div class="empty-state"><p class="empty-title">Post not found.</p><p class="empty-sub">${escapeHtml(e.message)}</p></div>`;
    document.getElementById('backBtn').addEventListener('click', () => { route = { name: 'feed' }; render(); });
    return;
  }
  const { post, comments } = data;
  const isOwner = currentUser && post.author && currentUser.id === post.author.id;

  const commentsHtml = comments.map(c => `
    <div class="comment">
      <div class="comment-rule"></div>
      <div class="comment-body">
        <p class="comment-text">${escapeHtml(c.text)}</p>
        <div class="comment-meta">
          <span class="byline">${escapeHtml(c.author?.username || 'unknown')}</span>
          <span class="dot">·</span>
          <time class="dateline">${formatDate(c.createdAt)}</time>
          ${currentUser && c.author && currentUser.id === c.author.id ? `<button class="btn-text btn-danger comment-delete" data-comment-id="${c._id}">Delete</button>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  mainEl.innerHTML = `
    <article class="post-detail">
      <button class="back-link" id="backBtn">← Back to dispatches</button>
      <h1 class="post-detail-title">${escapeHtml(post.title)}</h1>
      <div class="post-detail-meta">
        <span class="byline">${escapeHtml(post.author?.username || 'unknown')}</span>
        <span class="dot">·</span>
        <time class="dateline">${formatDate(post.createdAt)}</time>
      </div>
      ${isOwner ? `<div class="post-owner-actions"><button class="btn-text" id="editPostBtn">Edit</button><span class="dot">·</span><button class="btn-text btn-danger" id="deletePostBtn">Delete</button></div>` : ''}
      <div class="post-detail-content">${escapeHtml(post.content)}</div>
      <div class="comments-section">
        <h2 class="comments-heading">${comments.length === 1 ? '1 comment' : comments.length + ' comments'}</h2>
        <div class="comments-list">${commentsHtml}</div>
        <div id="commentFormWrap"></div>
      </div>
    </article>
  `;

  document.getElementById('backBtn').addEventListener('click', () => { route = { name: 'feed' }; render(); });

  if (isOwner) {
    document.getElementById('editPostBtn').addEventListener('click', () => { route = { name: 'edit', id: post._id }; render(); });
    document.getElementById('deletePostBtn').addEventListener('click', () => {
      if (!confirm('Delete this post and all its comments? This cannot be undone.')) return;
      try { Api.deletePost(token, post._id); route = { name: 'feed' }; render(); }
      catch (e) { alert('Could not delete post: ' + e.message); }
    });
  }

  mainEl.querySelectorAll('.comment-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('Delete this comment?')) return;
      try { Api.deleteComment(token, post._id, btn.dataset.commentId); route = { name: 'post', id: post._id }; render(); }
      catch (e) { alert('Could not delete comment: ' + e.message); }
    });
  });

  const formWrap = document.getElementById('commentFormWrap');
  if (currentUser) {
    formWrap.innerHTML = `
      <form id="commentForm" class="comment-form">
        <p class="comment-form-prompt">Add to the margin</p>
        <textarea id="commentText" rows="3" maxlength="1000" placeholder="Write a comment…" required></textarea>
        <p class="form-error" id="commentError" hidden></p>
        <div class="comment-form-actions"><button type="submit" class="btn btn-primary">Post comment</button></div>
      </form>
    `;
    document.getElementById('commentForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const text = document.getElementById('commentText').value.trim();
      const errEl = document.getElementById('commentError');
      errEl.hidden = true;
      if (!text) return;
      try { Api.addComment(token, post._id, text); route = { name: 'post', id: post._id }; render(); }
      catch (err) { errEl.textContent = err.message; errEl.hidden = false; }
    });
  } else {
    formWrap.innerHTML = `<p class="login-prompt"><a id="loginPromptLink">Log in</a> to join the discussion.</p>`;
    document.getElementById('loginPromptLink').addEventListener('click', () => { route = { name: 'login' }; render(); });
  }
}

function viewAuthForm(mode) {
  const isLogin = mode === 'login';
  mainEl.innerHTML = `
    <section class="auth-wrap">
      <h1 class="auth-title">${isLogin ? 'Log in' : 'Create an account'}</h1>
      <form id="authForm" class="auth-form" novalidate>
        ${!isLogin ? `<div class="field"><label for="username">Username</label><input type="text" id="username" name="username" autocomplete="username" /></div>` : ''}
        <div class="field"><label for="email">Email</label><input type="email" id="email" name="email" autocomplete="email" required /></div>
        <div class="field"><label for="password">Password</label><input type="password" id="password" name="password" autocomplete="current-password" required /></div>
        <p class="form-error" id="authError" hidden></p>
        <button type="submit" class="btn btn-primary btn-block">${isLogin ? 'Log in' : 'Sign up'}</button>
      </form>
      <p class="auth-switch" id="authSwitch"></p>
      ${isLogin ? `<p class="auth-switch" style="margin-top:8px;">Try it instantly — email <strong>editor@example.com</strong>, password <strong>demo123</strong></p>` : ''}
    </section>
  `;
  const switchEl = document.getElementById('authSwitch');
  switchEl.innerHTML = isLogin ? `New here? <a id="toRegister">Create an account</a>` : `Already have an account? <a id="toLogin">Log in</a>`;
  const switchLink = isLogin ? document.getElementById('toRegister') : document.getElementById('toLogin');
  switchLink.addEventListener('click', () => { route = { name: isLogin ? 'register' : 'login' }; render(); });

  document.getElementById('authForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const errEl = document.getElementById('authError');
    errEl.hidden = true;
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const username = isLogin ? null : document.getElementById('username').value.trim();
    try {
      const data = isLogin ? Api.login(email, password) : Api.register(username, email, password);
      token = data.token; currentUser = data.user;
      renderAuthNav();
      route = { name: 'feed' }; render();
    } catch (err) { errEl.textContent = err.message; errEl.hidden = false; }
  });
}

function viewPostForm(editId) {
  if (!currentUser) { route = { name: 'login' }; render(); return; }
  const isEdit = !!editId;
  let existing = null;
  if (isEdit) {
    try {
      const { post } = Api.getPost(editId);
      if (post.author.id !== currentUser.id) { alert('You can only edit your own posts.'); route = { name: 'post', id: editId }; render(); return; }
      existing = post;
    } catch (e) { alert('Could not load post: ' + e.message); route = { name: 'feed' }; render(); return; }
  }

  mainEl.innerHTML = `
    <section class="post-form-wrap">
      <h1 class="auth-title">${isEdit ? 'Edit post' : 'Write a post'}</h1>
      <form id="postForm" class="post-form" novalidate>
        <div class="field"><label for="postTitle">Title</label><input type="text" id="postTitle" name="title" maxlength="150" required value="${existing ? escapeHtml(existing.title) : ''}" /></div>
        <div class="field"><label for="postContent">Content</label><textarea id="postContent" name="content" rows="14" required>${existing ? escapeHtml(existing.content) : ''}</textarea></div>
        <p class="form-error" id="postFormError" hidden></p>
        <div class="post-form-actions">
          <button type="submit" class="btn btn-primary">${isEdit ? 'Save changes' : 'Publish'}</button>
          <a id="cancelLink">Cancel</a>
        </div>
      </form>
    </section>
  `;
  document.getElementById('cancelLink').addEventListener('click', () => { route = isEdit ? { name: 'post', id: editId } : { name: 'feed' }; render(); });
  document.getElementById('postForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const errEl = document.getElementById('postFormError');
    errEl.hidden = true;
    const title = document.getElementById('postTitle').value.trim();
    const content = document.getElementById('postContent').value.trim();
    try {
      const result = isEdit ? Api.updatePost(token, editId, title, content) : Api.createPost(token, title, content);
      route = { name: 'post', id: result.post._id }; render();
    } catch (err) { errEl.textContent = err.message; errEl.hidden = false; }
  });
}

function render() {
  window.scrollTo(0, 0);
  if (route.name === 'feed') return viewFeed();
  if (route.name === 'post') return viewPostDetail(route.id);
  if (route.name === 'new') return viewPostForm(null);
  if (route.name === 'edit') return viewPostForm(route.id);
  if (route.name === 'login') return viewAuthForm('login');
  if (route.name === 'register') return viewAuthForm('register');
  return viewFeed();
}

renderAuthNav();
render();
</script>
</body>
</html>
